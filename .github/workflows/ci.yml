name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  moonbit:
    name: MoonBit (${{ matrix.os }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: Show MoonBit version
        run: moon version --all

      - name: Check all targets
        run: moon check --target all

      - name: Test all targets
        run: moon test --target all

      - name: Verify formatting and package metadata
        if: matrix.os == 'ubuntu-latest'
        run: |
          moon fmt
          git diff --exit-code
          moon info
          git diff --exit-code

      - name: Run CLI smoke test
        if: matrix.os == 'ubuntu-latest'
        run: moon run cli

      - name: Run algo benchmark suite
        if: matrix.os == 'ubuntu-latest'
        run: moon run webui | python3 -c "import sys,json; d=json.load(sys.stdin); assert len(d['benchmarks'])==17, f'expected 17, got {len(d[\"benchmarks\"])}'; print('algo suite OK:', d['suite'])"

  webui:
    name: Web UI
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check static Web UI JavaScript
        run: node --check webui/app.js
