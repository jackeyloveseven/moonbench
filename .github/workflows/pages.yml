name: Deploy Web UI to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  MOONBIT_VERSION: 0.10.3+16975d007
  MOONBIT_CORE_VERSION: 0.10.3+16975d007

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1.22
        with:
          version: ${{ env.MOONBIT_VERSION }}
          core-version: ${{ env.MOONBIT_CORE_VERSION }}

      - name: Generate report data
        run: moon run webui > webui/report-data.json

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webui/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
